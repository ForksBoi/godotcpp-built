name: Build and Release godot-cpp

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # Allows manual triggering from the Actions tab

permissions:
  contents: write
  actions: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            arch: x86_64

          - platform: linux
            os: ubuntu-latest
            arch: x86_64

          - platform: macos
            os: macos-latest
            arch: universal

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0 # Important for syncing

      - name: Sync with Upstream
        shell: bash
        run: |
          # 1. Add the official godot-cpp as a remote
          git remote add upstream https://github.com/godotengine/godot-cpp
          git fetch upstream

          # 2. Check if we are behind the official master branch
          LOCAL=$(git rev-parse HEAD)
          UPSTREAM=$(git rev-parse upstream/master)

          if [ "$LOCAL" != "$UPSTREAM" ]; then
            echo "Changes detected! Updating fork..."
            git merge upstream/master --no-edit
            git push origin main
          else
            echo "Already up to date. No build needed today."
            exit 0
          fi
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install SCons
        run: pip install scons

      - name: Build godot-cpp
        shell: bash
        run: |
          # 1. Compile the library and generate missing headers
          scons platform=${{ matrix.platform }} arch=${{ matrix.arch }} \
                target=template_release generate_bindings=yes \
                custom_api_file=extension_api.json -j2

      - name: Create "Ready-to-Use" SDK
        shell: bash
        run: |
          mkdir -p sdk/include
          # 2. Copy the original core headers
          cp -r include/* sdk/include/
          # 3. Copy the NEWLY GENERATED headers from 'gen' folder
          cp -r gen/include/* sdk/include/
          # 4. Copy the compiled libraries (.lib, .a, or .dylib)
          mkdir -p sdk/bin
          cp bin/* sdk/bin/
          # 5. Zip it up so it's a single download
          tar -a -c -f godot-cpp-ready-${{ matrix.platform }}.zip sdk/


      - name: Upload Finished SDK
        uses: actions/upload-artifact@v4
        with:
          name: godot-cpp-sdk-${{ matrix.platform }}
          path: godot-cpp-ready-*.zip


  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
