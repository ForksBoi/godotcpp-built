name: Build and Release godot-cpp

on:
  push:
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            arch: x86_64

          - platform: linux
            os: ubuntu-latest
            arch: x86_64

          - platform: macos
            os: macos-latest
            arch: universal

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install SCons
        run: pip install scons

      - name: Build godot-cpp
        shell: bash
        run: |
          scons platform=${{ matrix.platform }} arch=${{ matrix.arch }} \
                target=template_release generate_bindings=yes \
                custom_api_file=extension_api.json -j2

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: godot-cpp-${{ matrix.platform }}-${{ matrix.arch }}
          path: bin/*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
